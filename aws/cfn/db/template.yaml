AWSTemplateFormatVersion: "2010-09-09"
Description: |
  CrdDb - RDS PostgreSQL instance for Cruddur
  Restored from snapshot into CrdNet private subnets.
  Imports CrdClusterServiceSGId for the DB security group ingress.

Parameters:
  NetworkingStack:
    Type: String
    Description: CrdNet stack name (source of VPC and private subnet exports)
    Default: CrdNet

  ClusterStack:
    Type: String
    Description: CrdCluster stack name (source of ServiceSG export)
    Default: CrdCluster

  DBSnapshotIdentifier:
    Type: String
    Description: Snapshot to restore the database from
    Default: cruddur-crddb-post-rotation-20260713

  DBInstanceClass:
    Type: String
    Description: RDS instance size
    Default: db.t3.micro

  DBInstanceIdentifier:
    Type: String
    Description: Identifier for the new RDS instance
    Default: cruddur-crddb-instance

  EngineVersion:
    Type: String
    Description: PostgreSQL engine version
    Default: "17.4"

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for CrdDb (CrdNet)
      SubnetIds: 
        !Split
          - ","
          - Fn::ImportValue: !Sub "${NetworkingStack}PrivateSubnetIds"

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for CrdDb RDS instance
      VpcId:
        Fn::ImportValue: !Sub "${NetworkingStack}VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId:
            Fn::ImportValue: !Sub "${ClusterStack}ServiceSGId"
          Description: PostgreSQL from Fargate Service SG (chain ALB SG to Service SG to DB SG)
      Tags:
        - Key: Name
          Value: cruddur-crddb-sg
  

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DBInstanceIdentifier: !Ref DBInstanceIdentifier
      DBSnapshotIdentifier: !Ref DBSnapshotIdentifier
      Engine: postgres
      EngineVersion: !Ref EngineVersion
      DBInstanceClass: !Ref DBInstanceClass
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt DBSecurityGroup.GroupId
      PubliclyAccessible: false
      MultiAZ: false
      StorageType: gp3
      EnableCloudwatchLogsExports:
        - postgresql
      CopyTagsToSnapshot: true
      # Let RDS generate and manage the master user password in Secrets Manager.
      # On snapshot restore this resets the master password to the managed secret,
      # so no human ever handles or writes the DB password again.
      ManageMasterUserPassword: true
      Tags:
        - Key: Name
          Value: cruddur-crddb-instance        
Outputs:
  DBInstanceEndpoint:
    Description: CrdDb RDS endpoint address
    Value: !GetAtt Database.Endpoint.Address
    Export:
      Name: !Sub "${AWS::StackName}DBEndpoint"

  DBInstancePort:
    Description: CrdDb RDS port
    Value: !GetAtt Database.Endpoint.Port
    Export:
      Name: !Sub "${AWS::StackName}DBPort"

  DBSecurityGroupId:
    Description: Security group ID for the CrdDb instance
    Value: !GetAtt DBSecurityGroup.GroupId
    Export:
      Name: !Sub "${AWS::StackName}DBSecurityGroupId"

  DBMasterUserSecretArn:
    Description: ARN of the RDS-managed master user secret in Secrets Manager
    Value: !GetAtt Database.MasterUserSecret.SecretArn
    Export:
      Name: !Sub "${AWS::StackName}DBMasterUserSecretArn"